<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{project.name}} — Technical Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { font-family: 'Inter', -apple-system, sans-serif; color: #1a1a2e; line-height: 1.7; background: #fff; }
    .container { max-width: 880px; margin: 0 auto; padding: 2.5rem; }
    .cover { display: block; text-align: center; background: linear-gradient(135deg, #0f1b3d 0%, #1B365D 40%, #2c5282 100%); color: white; padding: 10rem 3rem 6rem; page-break-after: always; }
    .cover-logo { width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.2); display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; margin-bottom: 2rem; background: rgba(255,255,255,0.05); }
    .cover h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; color: white; }
    .cover .subtitle { font-size: 1.15rem; font-weight: 300; color: rgba(255,255,255,0.7); max-width: 500px; margin: 0.5rem auto 0; line-height: 1.8; }
    .cover-divider { width: 60px; height: 3px; background: #63b3ed; margin: 2.5rem auto; }
    .cover-meta { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; font-size: 0.85rem; color: rgba(255,255,255,0.5); flex-wrap: wrap; }
    .cover-badge { margin-top: 2.5rem; display: inline-block; padding: 0.4rem 1.2rem; border: 1px solid rgba(255,255,255,0.15); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; color: rgba(255,255,255,0.6); }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 2.5rem 0; }
    .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.5rem; text-align: center; }
    .stat-number { font-size: 2.2rem; font-weight: 800; color: #1B365D; line-height: 1; }
    .stat-label { font-size: 0.78rem; color: #718096; margin-top: 0.4rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .section-banner { background: linear-gradient(135deg, #1B365D 0%, #2c5282 100%); color: white; padding: 1.5rem 2rem; margin: 3rem 0 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-banner .icon { width: 42px; height: 42px; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .section-banner h2 { font-size: 1.3rem; font-weight: 700; color: white; }
    .section-banner .section-desc { font-size: 0.82rem; color: rgba(255,255,255,0.65); }
    h3 { font-size: 1.15rem; font-weight: 700; color: #1B365D; margin: 2rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 2px solid #e2e8f0; }
    h4 { font-size: 1rem; font-weight: 600; color: #2d3748; margin: 1.5rem 0 0.5rem; }
    p { margin-bottom: 0.85rem; color: #2d3748; font-size: 0.92rem; }
    .callout { padding: 1.2rem 1.5rem; margin: 1.5rem 0; display: flex; gap: 1rem; align-items: flex-start; }
    .callout-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; font-weight: 700; }
    .callout-content { flex: 1; }
    .callout-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 0.3rem; }
    .callout-text { font-size: 0.85rem; line-height: 1.6; }
    .callout-warning { background: #fffbeb; border: 1px solid #fcd34d; }
    .callout-warning .callout-icon { background: #fef3c7; color: #d97706; }
    .callout-warning .callout-title { color: #92400e; }
    .callout-warning .callout-text { color: #78350f; }
    .callout-info { background: #eff6ff; border: 1px solid #93c5fd; }
    .callout-info .callout-icon { background: #dbeafe; color: #2563eb; }
    .callout-info .callout-title { color: #1e40af; }
    .callout-info .callout-text { color: #1e3a5f; }
    .callout-danger { background: #fef2f2; border: 1px solid #fca5a5; }
    .callout-danger .callout-icon { background: #fee2e2; color: #dc2626; }
    .callout-danger .callout-title { color: #991b1b; }
    .callout-danger .callout-text { color: #7f1d1d; }
    .callout-success { background: #f0fdf4; border: 1px solid #86efac; }
    .callout-success .callout-icon { background: #dcfce7; color: #16a34a; }
    .callout-success .callout-title { color: #166534; }
    .callout-success .callout-text { color: #14532d; }
    table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.88rem; border: 1px solid #e2e8f0; }
    th { background: #1B365D; color: white; padding: 0.85rem 1rem; text-align: left; font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid #e2e8f0; color: #334155; }
    tr:nth-child(even) td { background: #f8fafc; }
    .badge { display: inline-block; padding: 0.2rem 0.65rem; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-must { background: #fee2e2; color: #991b1b; }
    .badge-should { background: #fef3c7; color: #92400e; }
    .badge-could { background: #dcfce7; color: #166534; }
    .badge-wont { background: #f1f5f9; color: #475569; }
    .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1.5rem 0; }
    .team-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.5rem; text-align: center; }
    .team-avatar { width: 50px; height: 50px; background: linear-gradient(135deg, #1B365D, #2c5282); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.75rem; }
    .team-role { font-weight: 700; font-size: 0.9rem; color: #1B365D; }
    .team-dedication { font-size: 0.78rem; color: #64748b; margin-top: 0.3rem; }
    .team-desc { font-size: 0.8rem; color: #475569; margin-top: 0.5rem; line-height: 1.5; }
    .stack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1.5rem 0; }
    .stack-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.25rem; }
    .stack-layer { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 600; margin-bottom: 0.5rem; }
    .stack-name { font-size: 1.05rem; font-weight: 700; color: #1B365D; }
    .stack-reason { font-size: 0.78rem; color: #64748b; margin-top: 0.4rem; line-height: 1.5; }
    .timeline { position: relative; margin: 2rem 0; padding-left: 2rem; }
    .timeline::before { content: ''; position: absolute; left: 0.6rem; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, #1B365D, #63b3ed); }
    .timeline-item { position: relative; margin-bottom: 2rem; padding-left: 1.5rem; }
    .timeline-item::before { content: ''; position: absolute; left: -1.65rem; top: 0.35rem; width: 12px; height: 12px; background: #1B365D; border: 3px solid #dbeafe; }
    .timeline-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .timeline-title { font-weight: 700; font-size: 1rem; color: #1B365D; }
    .timeline-weeks { font-size: 0.75rem; padding: 0.15rem 0.6rem; background: #eff6ff; color: #2563eb; font-weight: 600; }
    .timeline-content { font-size: 0.85rem; color: #475569; line-height: 1.6; }
    .timeline-deliverables { margin-top: 0.5rem; padding: 0; list-style: none; }
    .timeline-deliverables li { padding: 0.25rem 0; font-size: 0.82rem; color: #475569; display: flex; align-items: center; gap: 0.5rem; }
    .timeline-deliverables li::before { content: ''; width: 5px; height: 5px; background: #63b3ed; flex-shrink: 0; }
    .module-card { background: #fff; border: 1px solid #e2e8f0; padding: 1.75rem; margin: 1.5rem 0; border-left: 4px solid #1B365D; }
    .module-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .module-number { width: 32px; height: 32px; background: #1B365D; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .module-title { font-weight: 700; font-size: 1.05rem; color: #1B365D; }
    .module-objective { font-size: 0.88rem; color: #475569; margin-bottom: 1rem; padding: 0.75rem 1rem; background: #f8fafc; border-left: 3px solid #63b3ed; }
    .module-steps { list-style: none; padding: 0; counter-reset: step; }
    .module-steps li { counter-increment: step; padding: 0.4rem 0 0.4rem 2.2rem; position: relative; font-size: 0.85rem; color: #334155; }
    .module-steps li::before { content: counter(step); position: absolute; left: 0; width: 22px; height: 22px; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; }
    .diagram-container { background: #f8fafc; border: 1px solid #e2e8f0; padding: 2rem; margin: 2rem 0; text-align: center; }
    .diagram-container img { max-width: 100%; height: auto; }
    .diagram-caption { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; font-style: italic; }
    .scope-in, .scope-out { list-style: none; padding: 0; margin: 1rem 0; }
    .scope-in li, .scope-out li { padding: 0.5rem 0 0.5rem 2rem; position: relative; font-size: 0.88rem; color: #334155; }
    .scope-in li::before { content: "\2713"; position: absolute; left: 0; width: 22px; height: 22px; background: #dcfce7; color: #16a34a; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    .scope-out li::before { content: "\2717"; position: absolute; left: 0; width: 22px; height: 22px; background: #fee2e2; color: #dc2626; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    .doc-footer { margin-top: 4rem; padding: 1.5rem 0; border-top: 2px solid #e2e8f0; text-align: center; color: #94a3b8; font-size: 0.8rem; }
    @media print {
      body { font-size: 10pt; }
      .cover { page-break-after: always; }
      .section-banner { page-break-before: always; }
      .stat-card, .team-card, .stack-card, .module-card, .callout { break-inside: avoid; }
      .stats-grid, .team-grid, .stack-grid { break-inside: avoid; }
      table { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="cover-logo">{{project.initials}}</div>
    <h1>{{project.name}}</h1>
    <p class="subtitle">{{project.description}}</p>
    <div class="cover-divider"></div>
    <div class="cover-meta">
      <span>{{metadata.generated_at}}</span>
      <span>|</span>
      <span>{{project.domain}}</span>
      <span>|</span>
      <span>{{project.scale}}</span>
    </div>
    <div class="cover-badge">Technical Report v1.0</div>
  </div>
  <div class="container">
    {{content}}
  </div>
  <div class="container">
    <div class="doc-footer">
      {{project.name}} — Technical Report — Generated by Architect Plugin
    </div>
  </div>
</body>
</html>
